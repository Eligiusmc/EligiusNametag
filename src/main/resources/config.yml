config_version: 8

# Update interval in seconds (0.5 = every 10 ticks)
interval: 0.5

# Max distance in blocks at which nametags are visible
view_distance: 64

# Vertical spacing between hologram lines
line_spacing: 0.275

# Base height offset above the entity's head (updates live on reload)
y_offset: 0.35

# Global plugin prefix for all messages
prefix: "<dark_gray>[<gradient:blue:aqua>Eltag</gradient>]</dark_gray> "

# Language file to use (e.g., 'es' for lang/es.yml, 'en' for lang/en.yml)
language: "es"

# Command aliases (all point to the same command tree)
command_aliases:
  - "enametag"
  - "eltag"

# Database configuration
database:
  type: "sqlite" # 'sqlite' for local file, 'mysql' for external database
  mysql:
    host: "localhost"
    port: 3306
    database: "eligiusnametag"
    username: "root"
    password: ""
