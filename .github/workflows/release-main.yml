name: Release Official Build

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Prepare gradle.properties for CI
      run: sed -i '/org.gradle.java.home/d' gradle.properties

    - name: Extract Version from gradle.properties
      id: extract_version
      run: |
        VERSION=$(grep -oP '^pluginVersion=\K.*' gradle.properties || echo "1.0.0")
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Extracted version: $VERSION"

    - name: Build with Gradle
      run: ./gradlew build

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: EligiusNametag v${{ env.VERSION }}
        body: |
          🚀 **Nueva Release Oficial: v${{ env.VERSION }}**
          
          Esta es la versión estable y recomendada para producción en servidores Paper/Folia.
          Consulta la [Wiki Oficial](https://Eligiusmc.github.io/EligiusNametag) para guías de instalación.
        draft: false
        prerelease: false
        files: build/libs/EligiusNametag*.jar
        generate_release_notes: true
