name: Develop CI (Beta Releases)

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Prepare gradle.properties for CI
      run: sed -i '/org.gradle.java.home/d' gradle.properties

    - name: Extract Version from gradle.properties
      id: extract_version
      run: |
        VERSION=$(grep -oP '^pluginVersion=\K.*' gradle.properties || echo "1.0.0")
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Extracted version: $VERSION"

    - name: Build with Gradle
      run: ./gradlew build

    - name: Create Beta Release on GitHub
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push'
      with:
        tag_name: v${{ env.VERSION }}-beta.${{ github.run_number }}
        name: EligiusNametag v${{ env.VERSION }} (Beta Build #${{ github.run_number }})
        body: |
          🧪 **Development Version (Auto-generated Beta)**
          
          This is an unstable beta build automatically generated from the `develop` branch of **EligiusNametag**.
          It contains new features that are still undergoing testing and verification. 
          
          ⚠️ **Not recommended for production servers** that require 100% stability.
          
          _If you are looking for the stable version, please download the official Releases (without the Beta tag)._
        draft: false
        prerelease: true
        files: build/libs/EligiusNametag*.jar
        generate_release_notes: false
