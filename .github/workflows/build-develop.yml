name: Develop CI (Beta Releases)

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Extract Version from build.gradle.kts
      id: extract_version
      run: |
        VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' build.gradle.kts || echo "1.0.0")
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Extracted version: $VERSION"

    - name: Build with Gradle
      run: ./gradlew build

    - name: Create Beta Release on GitHub
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push'
      with:
        tag_name: v${{ env.VERSION }}-beta.${{ github.run_number }}
        name: EligiusNametag v${{ env.VERSION }} (Beta Build #${{ github.run_number }})
        body: |
          🧪 **Versión de Desarrollo (Beta Automática)**
          
          Esta es una compilación inestable generada automáticamente desde la rama `develop`.
          Contiene características nuevas que aún están siendo testeadas. No se recomienda para servidores en producción que exijan 100% de estabilidad.
          
          _Si buscas la versión estable, por favor descarga las Releases oficiales (sin la etiqueta Beta)._
        draft: false
        prerelease: true
        files: build/libs/EligiusNametag*.jar
        generate_release_notes: false
