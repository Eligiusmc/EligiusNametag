config_version: 8

# Update interval in seconds (0.5 = every 10 ticks)
interval: 0.5

# Check for updates on startup
check_updates: true

# Max distance in blocks at which nametags are visible
view_distance: 64

# Vertical spacing between hologram lines
line_spacing: 0.275

# Base height offset above the entity's head (updates live on reload)
y_offset: 0.35

# Global plugin prefix for all messages
prefix: "<dark_gray>[<gradient:blue:aqua>Enametag</gradient>]</dark_gray> "

# Language file to use (e.g., 'es' for lang/es.yml, 'en' for lang/en.yml)
language: "es"

# Command aliases (all point to the same command tree)
command_aliases:
  - "enametag"
  - "eligiusnametag"

# ==========================================
# 📊 DATABASE CONFIGURATION
# ==========================================
# Configure your preferred database here.
# Supported types: sqlite, mysql
#
# SQLite is zero-setup and perfect for single servers.
# MySQL is recommended for proxy networks.
database:
  type: "sqlite"
  host: "localhost"
  port: 3306
  database: "eligius_nametag"
  username: "root"
  password: ""

# ==========================================
# 🌐 NETWORK SYNCHRONIZATION (REDIS)
# ==========================================
# Enable this ONLY if you are running a proxy network 
# (Velocity/BungeeCord) and want instant synchronization 
# across all servers when a player toggles their nametag.
redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
